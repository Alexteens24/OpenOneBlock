name: OpenOneBlock
version: '@version@'
main: dev.openoneblock.paper.OpenOneBlockPlugin
description: Build your own OneBlock experience.
api-version: '1.21.11'
author: Alexteens24
website: https://github.com/Alexteens24/OpenOneBlock
prefix: OpenOneBlock
load: POSTWORLD
softdepend:
  - FastAsyncWorldEdit
  - WorldEdit
  - OpenEco
  - Vault
  - PlaceholderAPI
  - ItemsAdder
  - Oraxen
  - Nexo
  - CraftEngine
  - MythicMobs
permissions:
  openoneblock.command:
    description: Allows use of the OpenOneBlock player command.
    default: true
  openoneblock.command.create:
    description: Allows creating an OpenOneBlock island.
    default: true
  openoneblock.command.help:
    description: Allows viewing OpenOneBlock command help.
    default: true
  openoneblock.command.home:
    description: Allows teleporting to an active OpenOneBlock island home.
    default: true
  openoneblock.command.info:
    description: Allows viewing the caller's OpenOneBlock island summary.
    default: true
  openoneblock.command.delete:
    description: Allows an owner to request and confirm island deletion.
    default: true
  openoneblock.command.reset:
    description: Allows an owner to request and confirm island reset.
    default: true
  openoneblock.admin.inspect:
    description: Allows read-only inspection of island diagnostics.
    default: op
  openoneblock.admin.operation:
    description: Allows read-only inspection of durable lifecycle operations.
    default: op
  openoneblock.admin.bypass:
    description: Explicitly bypasses island role and temporary protection policies.
    default: op
