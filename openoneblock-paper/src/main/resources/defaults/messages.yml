# Message presentation defaults.
schema-version: 1
locale: en_US
formatting:
  mini-message: true
  legacy-colors: false
messages:
  command.help: "OpenOneBlock: /ob create | home | info | reset | delete | admin inspect"
  command.unknown: "Unknown subcommand. Use /ob help."
  command.player-only: "This command can only be used by a player."
  command.no-permission: "You do not have permission to do that."
  command.not-ready: "OpenOneBlock is still starting. Try again shortly."
  command.create.started: "Creating your island... Operation: {operation_id}"
  command.create.success: "Island {island_id} is ready."
  command.create.replay: "Island {island_id} was already created."
  command.create.already-member: "You already belong to island {island_id}."
  command.create.failed: "Island creation failed safely. Operation: {operation_id}"
  command.create.delivery-failed: >-
    Island {island_id} is active, but the final teleport/message delivery failed.
  command.internal-error: "OpenOneBlock could not complete that operation."
  command.no-island: "You do not belong to an active island."
  command.home.started: "Preparing island home... Operation: {operation_id}"
  command.home.success: "Teleported to island {island_id}."
  command.home.unsafe: "Your stored island home is unsafe; ask an admin to repair it."
  command.home.failed: "Could not teleport home. Operation: {operation_id}"
  command.info: >-
    Island {island_id} | Owner {owner_id} | Role {role_id} | Phase {phase_id} |
    Border {current_border}/{maximum_border} | Breaks {total_breaks} |
    Sequence {sequence} | Members {members} | Version {version}
  command.delete.confirm: >-
    This permanently deletes island {island_id}. Run /ob delete confirm {token}
    before {expires_at}.
  command.delete.usage: "Use /ob delete, then /ob delete confirm <token>."
  command.delete.started: "Deleting island safely... Operation: {operation_id}"
  command.delete.success: "Island {island_id} was deleted safely."
  command.delete.quarantined: >-
    Cleanup could not be proven safe; the island slot was quarantined.
    Operation: {operation_id}
  command.delete.conflict: >-
    Island ownership or version changed; request a new confirmation.
  command.delete.failed: "Island deletion failed safely. Operation: {operation_id}"
  command.reset.confirm: >-
    This rebuilds island {island_id}. Run /ob reset confirm {token}
    before {expires_at}.
  command.reset.usage: "Use /ob reset, then /ob reset confirm <token>."
  command.reset.started: "Resetting island safely... Operation: {operation_id}"
  command.reset.success: "Island {island_id} was reset safely."
  command.reset.replay: "Island {island_id} was already reset."
  command.reset.quarantined: >-
    Reset could not be proven safe; the island slot was quarantined.
    Operation: {operation_id}
  command.reset.conflict: >-
    Island ownership or version changed; request a new reset confirmation.
  command.reset.failed: "Island reset failed safely. Operation: {operation_id}"
  command.admin.usage: "Use /ob admin inspect <island-id> or /ob admin operation <list|show>."
  command.admin.inspect.not-found: "Island {island_id} does not exist."
  command.admin.inspect: >-
    Island {island_id} | Owner {owner_id} | Lifecycle {lifecycle} v{island_version} |
    Shard {shard} | Grid {grid} | Slot {slot_id} {slot_state} v{slot_version} |
    Border {current_border}/{maximum_border} | Phase {phase} | Sequence {sequence} |
    Members {members} | Pending {pending_operation} | Runtime {runtime}
    ({loaded_chunks} chunks) | Updated {updated_at}
  command.admin.operation.usage: >-
    Use /ob admin operation list [island-id] [limit] or
    /ob admin operation show <operation-id>.
  command.admin.operation.empty: "No durable operations matched the query."
  command.admin.operation.not-found: "Operation {operation_id} does not exist."
  command.admin.operation.list-entry: >-
    {operation_id} | Island {island_id} | {kind}/{phase} | {outcome} |
    Retry {retry} | Updated {updated_at}
  command.admin.operation.show: >-
    Operation {operation_id} | Island {island_id} | {kind}/{phase} | Slot {slot_id} |
    Expected island v{expected_island_version}, slot v{expected_slot_version} |
    Outcome {outcome} | Retry {retry} | Error {error_code} |
    Last effect {last_effect} | Updated {updated_at}
  command.confirmation.invalid: "Confirmation token is invalid, expired, or already used."
